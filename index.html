<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krybit</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:linear-gradient(135deg,#0d0d0d,#151515,#1f0036);
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.bg{
position:fixed;
width:100%;
height:100%;
overflow:hidden;
z-index:-1;
}

.particle{
position:absolute;
width:4px;
height:4px;
border-radius:50%;
background:#b44cff;
box-shadow:0 0 15px #b44cff;
animation:float 12s linear infinite;
}

@keyframes float{
from{
transform:translateY(110vh);
opacity:0;
}
50%{
opacity:1;
}
to{
transform:translateY(-20vh);
opacity:0;
}
}

.card{
width:420px;
backdrop-filter:blur(20px);
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.1);
border-radius:30px;
padding:35px;
text-align:center;
box-shadow:0 0 50px rgba(180,76,255,.25);
}

.pfp{
width:120px;
height:120px;
border-radius:50%;
border:3px solid #b44cff;
box-shadow:0 0 25px #b44cff;
object-fit:cover;
}

h1{
margin-top:15px;
font-size:32px;
}

.bio{
opacity:.8;
margin-top:5px;
margin-bottom:25px;
}

.links{
display:flex;
flex-direction:column;
gap:12px;
}

.btn{
padding:15px;
border-radius:15px;
text-decoration:none;
color:white;
font-weight:600;
background:rgba(180,76,255,.15);
border:1px solid rgba(180,76,255,.5);
transition:.3s;
}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 0 20px #b44cff;
}

.stats{
display:flex;
justify-content:space-between;
margin-top:25px;
padding-top:20px;
border-top:1px solid rgba(255,255,255,.1);
}

.stat h2{
color:#b44cff;
}

.music{
margin-top:20px;
font-size:14px;
opacity:.7;
}

.badge{
display:inline-block;
padding:5px 10px;
background:#b44cff;
border-radius:999px;
font-size:12px;
margin-bottom:10px;
}
</style>
</head>
<body>

<div class="bg" id="bg"></div>

<div class="card">

<div class="badge">👑 OWNER</div>

<img class="pfp" src="https://i.imgur.com/8Km9tLL.jpg">

<h1>Bishweshwar</h1>

<p class="bio">
Developer • Minecraft • Discord • Krybit
</p>

<div class="links">
<a class="btn" href="#">💬 Discord</a>
<a class="btn" href="#">📸 Instagram</a>
<a class="btn" href="#">🎮 Minecraft Server</a>
<a class="btn" href="#">🛒 Krybit Store</a>
</div>

<div class="stats">
<div class="stat">
<h2>5K+</h2>
<p>Users</p>
</div>

<div class="stat">
<h2>24/7</h2>
<p>Support</p>
</div>

<div class="stat">
<h2>100+</h2>
<p>Sales</p>
</div>
</div>

<div class="music">
🎵 Listening to Spotify...
</div>

</div>

<script>
const bg=document.getElementById("bg");

for(let i=0;i<80;i++){
let p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(Math.random()*10+5)+"s";
p.style.animationDelay=Math.random()*5+"s";
bg.appendChild(p);
}
</script>

</body>
</html>
