<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krybit</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:#050505;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

body::before{
content:"";
position:absolute;
width:700px;
height:700px;
border-radius:50%;
background:radial-gradient(circle,rgba(255,255,255,.12),transparent 70%);
filter:blur(80px);
animation:pulse 5s infinite;
}

@keyframes pulse{
50%{
transform:scale(1.15);
opacity:.6;
}
}

.card{
width:1100px;
height:620px;
display:flex;
backdrop-filter:blur(20px);
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.08);
border-radius:40px;
overflow:hidden;
box-shadow:0 0 80px rgba(255,255,255,.05);
}

.left{
width:40%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(180deg,#111,#050505);
}

.pfp{
width:220px;
height:220px;
border-radius:50%;
object-fit:cover;
border:4px solid white;
box-shadow:0 0 40px rgba(255,255,255,.2);
}

h1{
margin-top:25px;
font-size:52px;
font-weight:800;
}

.bio{
margin-top:10px;
opacity:.7;
}

.right{
flex:1;
padding:60px;
display:flex;
flex-direction:column;
justify-content:center;
}

.title{
font-size:42px;
font-weight:800;
margin-bottom:15px;
}

.desc{
opacity:.7;
line-height:1.8;
margin-bottom:35px;
}

.links{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
}

.btn{
text-decoration:none;
color:white;
padding:22px;
border-radius:20px;
background:#101010;
border:1px solid #222;
font-weight:700;
font-size:18px;
transition:.3s;
}

.btn:hover{
transform:translateY(-6px);
background:#fff;
color:#000;
box-shadow:0 15px 40px rgba(255,255,255,.15);
}

.stats{
margin-top:40px;
display:flex;
gap:20px;
}

.stat{
flex:1;
background:#101010;
border:1px solid #222;
padding:20px;
border-radius:18px;
text-align:center;
}

.number{
font-size:32px;
font-weight:800;
}

.label{
opacity:.6;
margin-top:5px;
}

.music{
margin-top:30px;
padding:18px;
background:#0d0d0d;
border-radius:18px;
border:1px solid #222;
}
</style>
</head>
<body>

<div class="card">

<div class="left">
<img class="pfp" src="https://i.imgur.com/8Km9tLL.jpg">
<h1>KRYBIT</h1>
<div class="bio">Developer • Minecraft • Discord</div>
</div>

<div class="right">

<div class="title">
Welcome to my profile
</div>

<div class="desc">
Building Minecraft servers, Discord projects,
websites and digital products.
</div>

<div class="links">
<a href="#" class="btn">💬 Discord</a>
<a href="#" class="btn">📸 Instagram</a>
<a href="#" class="btn">🛒 Store</a>
<a href="#" class="btn">🎮 Minecraft</a>
</div>

<div class="stats">
<div class="stat">
<div class="number">5K+</div>
<div class="label">Users</div>
</div>

<div class="stat">
<div class="number">24/7</div>
<div class="label">Support</div>
</div>

<div class="stat">
<div class="number">100+</div>
<div class="label">Sales</div>
</div>
</div>

<div class="music">
🎵 Currently Building Something Cool...
</div>

</div>

</div>

</body>
</html>
